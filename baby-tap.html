<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐭 Baby Tap! — For Kommander</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0a2e;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Comic Sans MS', 'Chalkboard SE', 'Arial Rounded MT Bold', sans-serif;
    touch-action: manipulation;
    user-select: none;
  }

  #canvas {
    position: fixed;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 10;
  }

  #stage {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 20px;
  }

  .animal-btn {
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 3.5rem;
    transition: transform 0.12s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 8px 30px rgba(0,0,0,0.4), inset 0 3px 0 rgba(255,255,255,0.2);
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    outline: none;
    position: relative;
    overflow: visible;
  }

  .animal-btn:active {
    transform: scale(0.88) !important;
  }

  .animal-btn .label {
    font-size: 0.9rem;
    font-weight: bold;
    color: rgba(255,255,255,0.9);
    letter-spacing: 1px;
    text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
    margin-top: 4px;
  }

  .animal-btn.bounce {
    animation: bigBounce 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes bigBounce {
    0% { transform: scale(1); }
    40% { transform: scale(1.4); }
    70% { transform: scale(0.95); }
    100% { transform: scale(1); }
  }

  /* Flash overlay */
  #flash {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 5;
    opacity: 0;
    transition: opacity 0.05s;
  }

  /* Big emoji popup */
  .popup-emoji {
    position: fixed;
    font-size: 6rem;
    pointer-events: none;
    z-index: 20;
    animation: popUp 1.2s ease-out forwards;
  }

  @keyframes popUp {
    0% { transform: scale(0) rotate(-20deg); opacity: 1; }
    30% { transform: scale(1.3) rotate(10deg); opacity: 1; }
    60% { transform: scale(1.1) rotate(-5deg); opacity: 1; }
    80% { transform: scale(1.15) rotate(0deg); opacity: 1; }
    100% { transform: scale(1.5) rotate(5deg) translateY(-80px); opacity: 0; }
  }

  /* Exit hint - tiny, out of reach of baby */
  #exit-hint {
    position: fixed;
    bottom: 6px;
    right: 10px;
    font-size: 9px;
    color: rgba(255,255,255,0.15);
    z-index: 100;
    cursor: pointer;
    touch-action: manipulation;
  }

  /* Sound name popup */
  .sound-popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 4rem;
    font-weight: bold;
    color: white;
    text-shadow: 0 0 20px rgba(255,255,255,0.8), 3px 3px 10px rgba(0,0,0,0.8);
    z-index: 30;
    pointer-events: none;
    letter-spacing: 4px;
    animation: wordPop 1.5s ease-out forwards;
  }

  @keyframes wordPop {
    0% { transform: translate(-50%, -50%) scale(0) rotate(-10deg); opacity: 0; }
    20% { transform: translate(-50%, -50%) scale(1.1) rotate(3deg); opacity: 1; }
    40% { transform: translate(-50%, -50%) scale(0.95) rotate(0deg); opacity: 1; }
    80% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1.2) rotate(5deg); opacity: 0; }
  }

  /* Stars background */
  #stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  #stage { position: relative; z-index: 1; }
</style>
</head>
<body>

<canvas id="stars"></canvas>
<canvas id="canvas"></canvas>
<div id="flash"></div>

<div id="stage"></div>
<div id="exit-hint" onclick="window.history.back()">← back</div>

<script>
// ─── STAR FIELD ───────────────────────────────────────────────
const starsCv = document.getElementById('stars');
const sCtx = starsCv.getContext('2d');
starsCv.width = window.innerWidth;
starsCv.height = window.innerHeight;
const STARS = Array.from({length:120}, () => ({
  x: Math.random() * starsCv.width,
  y: Math.random() * starsCv.height,
  r: Math.random() * 1.5 + 0.3,
  phase: Math.random() * Math.PI * 2
}));
function drawStars(t) {
  sCtx.clearRect(0,0,starsCv.width,starsCv.height);
  STARS.forEach(s => {
    const a = 0.4 + 0.5 * Math.sin(s.phase + t * 0.001);
    sCtx.beginPath();
    sCtx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    sCtx.fillStyle = `rgba(255,240,255,${a})`;
    sCtx.fill();
  });
  requestAnimationFrame(drawStars);
}
requestAnimationFrame(drawStars);

// ─── CONFETTI CANVAS ──────────────────────────────────────────
const cv = document.getElementById('canvas');
const ctx = cv.getContext('2d');
cv.width = window.innerWidth;
cv.height = window.innerHeight;
window.addEventListener('resize', () => {
  cv.width = window.innerWidth;
  cv.height = window.innerHeight;
  starsCv.width = window.innerWidth;
  starsCv.height = window.innerHeight;
  buildStage();
});

let particles = [];
function spawnConfetti(x, y, color) {
  for (let i = 0; i < 50; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 4 + Math.random() * 10;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 6,
      size: 6 + Math.random() * 10,
      color: confettiColors[Math.floor(Math.random() * confettiColors.length)],
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.3,
      life: 1,
      shape: Math.random() < 0.5 ? 'rect' : 'circle'
    });
  }
}
const confettiColors = ['#ff6b9d','#ffd700','#7fff7f','#00cfff','#ff9500','#bf7fff','#ff4466','#ffffff'];

function animateConfetti() {
  ctx.clearRect(0, 0, cv.width, cv.height);
  particles = particles.filter(p => p.life > 0.01);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.35;
    p.vx *= 0.97;
    p.rotation += p.rotSpeed;
    p.life -= 0.018;

    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rotation);
    if (p.shape === 'rect') {
      ctx.fillRect(-p.size/2, -p.size/4, p.size, p.size/2);
    } else {
      ctx.beginPath();
      ctx.arc(0, 0, p.size/3, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  });
  ctx.globalAlpha = 1;
  requestAnimationFrame(animateConfetti);
}
requestAnimationFrame(animateConfetti);

// ─── WEB AUDIO ────────────────────────────────────────────────
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playAnimalSound(animal) {
  const ac = getAudio();
  const now = ac.currentTime;
  switch(animal) {
    case 'cat': {
      // Meow — frequency sweep up then down
      const o = ac.createOscillator(); const g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(500, now);
      o.frequency.linearRampToValueAtTime(900, now + 0.15);
      o.frequency.linearRampToValueAtTime(600, now + 0.4);
      g.gain.setValueAtTime(0.4, now);
      g.gain.linearRampToValueAtTime(0.3, now + 0.3);
      g.gain.linearRampToValueAtTime(0, now + 0.55);
      o.start(now); o.stop(now + 0.55);
      break;
    }
    case 'dog': {
      // Woof — short burst with overtones
      const o = ac.createOscillator(); const g = ac.createGain();
      const o2 = ac.createOscillator(); const g2 = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o2.connect(g2); g2.connect(ac.destination);
      o.type = 'sawtooth'; o2.type = 'square';
      o.frequency.setValueAtTime(200, now);
      o.frequency.linearRampToValueAtTime(120, now + 0.2);
      o2.frequency.setValueAtTime(300, now);
      o2.frequency.linearRampToValueAtTime(180, now + 0.2);
      g.gain.setValueAtTime(0.35, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      g2.gain.setValueAtTime(0.2, now);
      g2.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
      o.start(now); o.stop(now + 0.35);
      o2.start(now); o2.stop(now + 0.3);
      break;
    }
    case 'duck': {
      // Quack — nasal buzz
      const o = ac.createOscillator(); const g = ac.createGain();
      const filt = ac.createBiquadFilter();
      o.connect(filt); filt.connect(g); g.connect(ac.destination);
      o.type = 'square';
      filt.type = 'bandpass';
      filt.frequency.value = 800;
      filt.Q.value = 8;
      o.frequency.setValueAtTime(800, now);
      o.frequency.linearRampToValueAtTime(500, now + 0.08);
      o.frequency.linearRampToValueAtTime(700, now + 0.18);
      g.gain.setValueAtTime(0.5, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
      o.start(now); o.stop(now + 0.3);
      break;
    }
    case 'cow': {
      // Moooo — long, low
      const o = ac.createOscillator(); const g = ac.createGain();
      const lfo = ac.createOscillator(); const lfoG = ac.createGain();
      lfo.connect(lfoG); lfoG.connect(o.frequency);
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine'; lfo.type = 'sine';
      o.frequency.setValueAtTime(160, now);
      o.frequency.linearRampToValueAtTime(200, now + 0.3);
      o.frequency.linearRampToValueAtTime(150, now + 0.9);
      lfo.frequency.value = 5; lfoG.gain.value = 8;
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(0.5, now + 0.1);
      g.gain.linearRampToValueAtTime(0.45, now + 0.7);
      g.gain.linearRampToValueAtTime(0, now + 1.0);
      lfo.start(now); lfo.stop(now + 1.0);
      o.start(now); o.stop(now + 1.0);
      break;
    }
    case 'pig': {
      // Oink — nasal snort
      const o = ac.createOscillator(); const g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(300, now);
      o.frequency.linearRampToValueAtTime(220, now + 0.1);
      o.frequency.linearRampToValueAtTime(350, now + 0.2);
      o.frequency.linearRampToValueAtTime(280, now + 0.35);
      g.gain.setValueAtTime(0.35, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      o.start(now); o.stop(now + 0.4);
      break;
    }
    case 'sheep': {
      // Baa — vibrato bleat
      const o = ac.createOscillator(); const g = ac.createGain();
      const lfo = ac.createOscillator(); const lfoG = ac.createGain();
      lfo.connect(lfoG); lfoG.connect(o.frequency);
      o.connect(g); g.connect(ac.destination);
      o.type = 'triangle'; lfo.type = 'sine';
      o.frequency.value = 350;
      lfo.frequency.value = 7; lfoG.gain.value = 30;
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(0.4, now + 0.05);
      g.gain.linearRampToValueAtTime(0.35, now + 0.5);
      g.gain.linearRampToValueAtTime(0, now + 0.7);
      lfo.start(now); lfo.stop(now + 0.7);
      o.start(now); o.stop(now + 0.7);
      break;
    }
    case 'elephant': {
      // Trumpet — rising sweep
      const o = ac.createOscillator(); const g = ac.createGain();
      const dist = ac.createWaveShaper();
      const curve = new Float32Array(256);
      for (let i=0;i<256;i++) { const x=(i*2/256)-1; curve[i]=Math.tanh(x*3); }
      dist.curve = curve;
      o.connect(dist); dist.connect(g); g.connect(ac.destination);
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(200, now);
      o.frequency.exponentialRampToValueAtTime(600, now + 0.5);
      o.frequency.linearRampToValueAtTime(500, now + 0.7);
      g.gain.setValueAtTime(0.25, now);
      g.gain.linearRampToValueAtTime(0.3, now + 0.4);
      g.gain.linearRampToValueAtTime(0, now + 0.8);
      o.start(now); o.stop(now + 0.8);
      break;
    }
    case 'frog': {
      // Ribbit — two quick bursts
      [0, 0.2].forEach(offset => {
        const o = ac.createOscillator(); const g = ac.createGain();
        o.connect(g); g.connect(ac.destination);
        o.type = 'square';
        o.frequency.setValueAtTime(250, now + offset);
        o.frequency.exponentialRampToValueAtTime(150, now + offset + 0.12);
        g.gain.setValueAtTime(0.3, now + offset);
        g.gain.exponentialRampToValueAtTime(0.001, now + offset + 0.15);
        o.start(now + offset); o.stop(now + offset + 0.2);
      });
      break;
    }
    case 'lion': {
      // Roar — noise burst + low rumble
      const buf = ac.createBuffer(1, ac.sampleRate * 0.8, ac.sampleRate);
      const data = buf.getChannelData(0);
      for (let i=0;i<data.length;i++) data[i]=(Math.random()*2-1);
      const src = ac.createBufferSource();
      src.buffer = buf;
      const filt = ac.createBiquadFilter();
      filt.type = 'lowpass';
      filt.frequency.setValueAtTime(300, now);
      filt.frequency.linearRampToValueAtTime(80, now + 0.6);
      const g = ac.createGain();
      src.connect(filt); filt.connect(g); g.connect(ac.destination);
      g.gain.setValueAtTime(0.6, now);
      g.gain.linearRampToValueAtTime(0.4, now + 0.4);
      g.gain.linearRampToValueAtTime(0, now + 0.8);
      src.start(now); src.stop(now + 0.8);
      break;
    }
    case 'chicken': {
      // Bawk bawk! — fast clucks
      [0, 0.15, 0.3].forEach((offset, i) => {
        const o = ac.createOscillator(); const g = ac.createGain();
        o.connect(g); g.connect(ac.destination);
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(600 + i*80, now + offset);
        o.frequency.linearRampToValueAtTime(400, now + offset + 0.1);
        g.gain.setValueAtTime(0.3, now + offset);
        g.gain.exponentialRampToValueAtTime(0.001, now + offset + 0.12);
        o.start(now + offset); o.stop(now + offset + 0.15);
      });
      break;
    }
  }
}

// ─── ANIMALS DATA ─────────────────────────────────────────────
const animals = [
  { emoji: '🐱', sound: 'cat',     word: 'MEOW!',    bg: '#ff6b9d', shadow: '#c41660' },
  { emoji: '🐶', sound: 'dog',     word: 'WOOF!',    bg: '#ff9500', shadow: '#c46800' },
  { emoji: '🦆', sound: 'duck',    word: 'QUACK!',   bg: '#00cfff', shadow: '#007ca8' },
  { emoji: '🐄', sound: 'cow',     word: 'MOOO!',    bg: '#7fff7f', shadow: '#3aaa3a' },
  { emoji: '🐷', sound: 'pig',     word: 'OINK!',    bg: '#ffaacc', shadow: '#c45080' },
  { emoji: '🐑', sound: 'sheep',   word: 'BAAA!',    bg: '#f0f0ff', shadow: '#8888bb' },
  { emoji: '🐘', sound: 'elephant',word: 'PAWOO!',   bg: '#bf7fff', shadow: '#7733bb' },
  { emoji: '🐸', sound: 'frog',    word: 'RIBBIT!',  bg: '#7fff7f', shadow: '#009900' },
  { emoji: '🦁', sound: 'lion',    word: 'ROAR!',    bg: '#ffd700', shadow: '#aa8800' },
  { emoji: '🐔', sound: 'chicken', word: 'BAWK!',    bg: '#ffdd77', shadow: '#bb8800' },
];

// ─── STAGE BUILDER ────────────────────────────────────────────
function buildStage() {
  const stage = document.getElementById('stage');
  stage.innerHTML = '';

  const vw = window.innerWidth;
  const vh = window.innerHeight;
  // Fit buttons nicely: aim for 5 per row on wide, 2 per row on tiny
  const cols = vw < 400 ? 2 : vw < 600 ? 2 : vw < 900 ? 3 : 5;
  const rows = Math.ceil(animals.length / cols);
  const gap = 20;
  const btnSize = Math.min(
    (vw - gap * (cols + 1)) / cols,
    (vh - gap * (rows + 1)) / rows - 30,
    160
  );

  stage.style.gap = gap + 'px';
  stage.style.padding = gap + 'px';

  animals.forEach(a => {
    const btn = document.createElement('button');
    btn.className = 'animal-btn';
    btn.style.width = btnSize + 'px';
    btn.style.height = btnSize + 'px';
    btn.style.background = `radial-gradient(circle at 40% 35%, ${lighten(a.bg)}, ${a.bg} 60%, ${a.shadow})`;
    btn.style.boxShadow = `0 8px 25px ${a.shadow}88, inset 0 3px 0 rgba(255,255,255,0.3)`;
    btn.style.fontSize = Math.floor(btnSize * 0.4) + 'px';

    const emojiEl = document.createElement('span');
    emojiEl.textContent = a.emoji;

    btn.appendChild(emojiEl);
    btn.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      handleTap(btn, a, e.clientX, e.clientY);
    });

    stage.appendChild(btn);
  });
}

function lighten(hex) {
  // Simple lighten
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+60)},${Math.min(255,g+60)},${Math.min(255,b+60)})`;
}

// ─── TAP HANDLER ──────────────────────────────────────────────
let lastWord = null;

function handleTap(btn, animal, x, y) {
  // Play sound
  playAnimalSound(animal.sound);

  // Bounce animation
  btn.classList.remove('bounce');
  void btn.offsetWidth; // reflow
  btn.classList.add('bounce');

  // Screen flash
  const flash = document.getElementById('flash');
  flash.style.background = animal.bg;
  flash.style.opacity = '0.25';
  setTimeout(() => { flash.style.opacity = '0'; }, 120);

  // Confetti burst from tap point
  spawnConfetti(x, y, animal.bg);
  // Also from center of button
  const rect = btn.getBoundingClientRect();
  spawnConfetti(rect.left + rect.width/2, rect.top + rect.height/2, animal.bg);

  // Floating emoji popup
  const pop = document.createElement('div');
  pop.className = 'popup-emoji';
  pop.textContent = animal.emoji;
  pop.style.left = (x - 40) + 'px';
  pop.style.top = (y - 40) + 'px';
  document.body.appendChild(pop);
  setTimeout(() => pop.remove(), 1300);

  // Word popup (center screen)
  if (lastWord) lastWord.remove();
  const wordEl = document.createElement('div');
  wordEl.className = 'sound-popup';
  wordEl.textContent = animal.word;
  wordEl.style.color = animal.bg;
  wordEl.style.textShadow = `0 0 30px ${animal.bg}, 3px 3px 10px rgba(0,0,0,0.8)`;
  document.body.appendChild(wordEl);
  lastWord = wordEl;
  setTimeout(() => { wordEl.remove(); if (lastWord === wordEl) lastWord = null; }, 1500);
}

// ─── INIT ──────────────────────────────────────────────────────
buildStage();

// Prevent scroll/zoom behavior
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
document.addEventListener('gesturestart', e => e.preventDefault());
</script>
</body>
</html>
