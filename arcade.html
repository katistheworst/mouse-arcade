*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#1a0a2e;color:#e8d5f5;min-height:100vh;overflow-x:hidden}
canvas{position:fixed;top:0;left:0;z-index:0;pointer-events:none}
.wrap{position:relative;z-index:1;max-width:800px;margin:0 auto;padding:24px 16px 60px}
h1{text-align:center;font-size:2.2em;margin-bottom:4px;background:linear-gradient(135deg,#e879f9,#a855f7,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{text-align:center;font-size:.95em;color:#a78bba;margin-bottom:28px}
.filters{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:24px}
.filters button{background:rgba(168,85,247,.15);border:1px solid rgba(168,85,247,.3);color:#c4a5de;padding:6px 16px;border-radius:20px;cursor:pointer;font-size:.85em;transition:all .2s}
.filters button:hover,.filters button.active{background:rgba(168,85,247,.4);color:#fff;border-color:#a855f7}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px}
.card{background:linear-gradient(135deg,rgba(88,28,135,.4),rgba(59,7,100,.5));border:1px solid rgba(168,85,247,.2);border-radius:16px;padding:20px;cursor:pointer;transition:all .3s;text-decoration:none;color:inherit;display:flex;flex-direction:column}
.card:hover{transform:translateY(-4px);border-color:#a855f7;box-shadow:0 8px 30px rgba(168,85,247,.25)}
.card .icon{font-size:2.4em;margin-bottom:8px}
.card h3{font-size:1.05em;margin-bottom:6px;color:#e8d5f5}
.card .desc{font-size:.82em;color:#a78bba;line-height:1.4;flex:1}
.card .tag{display:inline-block;font-size:.7em;padding:2px 8px;border-radius:10px;margin-top:10px;background:rgba(168,85,247,.2);color:#c4a5de}
.card .date{font-size:.7em;color:#7c5a9a;margin-top:6px}
.section{margin-top:32px}
.section h2{font-size:1.1em;color:#c084fc;margin-bottom:14px;padding-left:4px;border-left:3px solid #a855f7;padding-left:12px}
.footer{text-align:center;margin-top:40px;font-size:.8em;color:#5a3d7a}

const grid=document.getElementById('grid');
const count=document.getElementById('count');
count.textContent=items.length; // auto-updates

function render(filter){
grid.innerHTML='';
const shown=filter==='all'?items:items.filter(i=>i.tag===filter);
shown.forEach((it,i)=>{
const a=document.createElement('a');
a.className='card';a.href=it.file;
a.style.animationDelay=i*60+'ms';
a.innerHTML=`<div class="icon">${it.icon}</div><h3>${it.name}</h3><div class="desc">${it.desc}</div><span class="tag">${it.tag}</span><div class="date">${it.date}</div>`;
grid.appendChild(a);
});
}
render('all');

document.querySelector('.filters').addEventListener('click',e=>{
if(e.target.tagName!=='BUTTON')return;
document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
e.target.classList.add('active');
render(e.target.dataset.f);
});

// starfield bg
const c=document.getElementById('bg'),ctx=c.getContext('2d');
let w,h,stars=[];
function resize(){w=c.width=innerWidth;h=c.height=innerHeight;stars=Array.from({length:80},()=>({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+.5,s:Math.random()*.3+.1,o:Math.random()}))}
resize();addEventListener('resize',resize);
function draw(){
ctx.clearRect(0,0,w,h);
stars.forEach(s=>{
s.o+=s.s*.02;
const a=.3+Math.sin(s.o)*.3;
ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fillStyle=`rgba(168,85,247,${a})`;ctx.fill();
});
requestAnimationFrame(draw);
}
draw();
