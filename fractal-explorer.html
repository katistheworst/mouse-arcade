<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌀 Fractal Explorer — Infinite Zoom</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0010; overflow:hidden; width:100vw; height:100vh; font-family:'Courier New',monospace; }

canvas { display:block; cursor:crosshair; }

#ui {
  position:fixed; top:0; left:0; right:0; bottom:0;
  pointer-events:none;
  z-index:10;
}
#controls {
  position:fixed;
  bottom:18px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  align-items:center;
  gap:10px;
  background:rgba(10,0,20,0.85);
  border:1px solid rgba(160,100,255,0.3);
  border-radius:14px;
  padding:10px 18px;
  pointer-events:all;
  opacity:0;
  transition:opacity 0.3s;
  backdrop-filter:blur(8px);
  flex-wrap:wrap;
  justify-content:center;
  max-width:95vw;
}
body:hover #controls { opacity:1; }

.btn {
  background:rgba(140,80,255,0.18);
  border:1px solid rgba(160,100,255,0.4);
  color:#d4aaff;
  border-radius:8px;
  padding:6px 12px;
  font-size:0.75rem;
  cursor:pointer;
  font-family:inherit;
  transition:all 0.15s;
  white-space:nowrap;
}
.btn:hover { background:rgba(160,100,255,0.35); color:#fff; }
.btn.active { background:rgba(160,100,255,0.5); color:#fff; border-color:#bf7fff; }

.sep { width:1px; height:20px; background:rgba(160,100,255,0.2); }

#info {
  position:fixed;
  top:14px;
  left:50%;
  transform:translateX(-50%);
  color:rgba(180,140,255,0.7);
  font-size:0.65rem;
  letter-spacing:2px;
  text-transform:uppercase;
  pointer-events:none;
  text-align:center;
}

#progress {
  position:fixed;
  top:0;
  left:0;
  height:2px;
  background:linear-gradient(90deg,#7b2fff,#ff6bff);
  transition:width 0.1s;
  z-index:20;
}

#zoom-level {
  position:fixed;
  top:14px;
  right:16px;
  color:rgba(180,140,255,0.5);
  font-size:0.6rem;
  letter-spacing:1px;
  pointer-events:none;
}

#hint {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:rgba(180,140,255,0.4);
  font-size:0.75rem;
  letter-spacing:3px;
  text-align:center;
  pointer-events:none;
  animation:fadeHint 3s 1.5s ease-out forwards;
  line-height:1.8;
}
@keyframes fadeHint {
  0% { opacity:1; }
  100% { opacity:0; }
}
</style>
</head>
<body>

<div id="progress" style="width:0"></div>
<canvas id="c"></canvas>

<div id="ui">
  <div id="info">🌀 FRACTAL EXPLORER</div>
  <div id="zoom-level">1×</div>
  <div id="hint">scroll to zoom · click to center<br>double-click for deep zoom</div>

  <div id="controls">
    <span style="color:#bf7fff;font-size:0.7rem;letter-spacing:1px">FRACTAL</span>
    <button class="btn active" id="btn-mandelbrot" onclick="setFractal('mandelbrot',this)">Mandelbrot</button>
    <button class="btn" id="btn-julia" onclick="setFractal('julia',this)">Julia Set</button>
    <button class="btn" id="btn-burning" onclick="setFractal('burning',this)">Burning Ship</button>
    <div class="sep"></div>
    <span style="color:#bf7fff;font-size:0.7rem;letter-spacing:1px">COLOR</span>
    <button class="btn active" id="pal-0" onclick="setPalette(0,this)">Purple</button>
    <button class="btn" id="pal-1" onclick="setPalette(1,this)">Fire</button>
    <button class="btn" id="pal-2" onclick="setPalette(2,this)">Ocean</button>
    <button class="btn" id="pal-3" onclick="setPalette(3,this)">Electric</button>
    <button class="btn" id="pal-4" onclick="setPalette(4,this)">Gold</button>
    <div class="sep"></div>
    <button class="btn" onclick="resetView()">Reset</button>
    <button class="btn" onclick="saveImg()">Save PNG</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const progressBar = document.getElementById('progress');
const zoomEl = document.getElementById('zoom-level');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  scheduleRender();
}
resize();
window.addEventListener('resize', resize);

// View state
let centerX = -0.5, centerY = 0;
let zoom = 1 / 2.5; // world units per pixel
let fractalType = 'mandelbrot';
let juliaC = { r: -0.7, i: 0.27015 };
let palette = 0;
let maxIter = 200;

// Palette definitions — each is a function (t: 0..1) → [r,g,b]
const palettes = [
  // Purple Haze
  (t) => {
    if (t >= 1) return [8, 0, 20];
    const s = t * Math.PI * 2;
    const r = Math.floor(30 + 160 * Math.pow(t, 0.5) * (0.5 + 0.5*Math.sin(s * 1.5)));
    const g = Math.floor(5 + 40 * t * (0.3 + 0.3*Math.sin(s * 2)));
    const b = Math.floor(60 + 160 * Math.pow(t, 0.4) * (0.6 + 0.4*Math.cos(s)));
    return [Math.min(255,r), Math.min(255,g), Math.min(255,b)];
  },
  // Fire
  (t) => {
    if (t >= 1) return [0, 0, 0];
    const r = Math.min(255, Math.floor(255 * Math.pow(t * 1.5, 0.5)));
    const g = Math.min(255, Math.floor(255 * Math.pow(t * 1.2, 2)));
    const b = Math.min(255, Math.floor(60 * t * t));
    return [r, g, b];
  },
  // Ocean
  (t) => {
    if (t >= 1) return [0, 5, 20];
    const r = Math.floor(5 + 40 * t);
    const g = Math.floor(50 + 160 * Math.pow(t, 0.6));
    const b = Math.floor(100 + 140 * t);
    return [Math.min(255,r), Math.min(255,g), Math.min(255,b)];
  },
  // Electric
  (t) => {
    if (t >= 1) return [0, 0, 5];
    const s = t * Math.PI * 4;
    const r = Math.floor(20 + 100 * Math.pow(Math.sin(s), 2));
    const g = Math.floor(20 + 200 * t * (0.5 + 0.5*Math.sin(s * 1.3)));
    const b = Math.floor(40 + 200 * Math.pow(Math.cos(s * 0.7), 2));
    return [Math.min(255,r), Math.min(255,g), Math.min(255,b)];
  },
  // Gold
  (t) => {
    if (t >= 1) return [5, 3, 0];
    const r = Math.min(255, Math.floor(60 + 190 * Math.pow(t, 0.5)));
    const g = Math.min(255, Math.floor(30 + 150 * Math.pow(t, 0.7)));
    const b = Math.min(255, Math.floor(10 * t));
    return [r, g, b];
  },
];

let renderToken = 0;
let renderScheduled = false;

function scheduleRender() {
  if (!renderScheduled) {
    renderScheduled = true;
    requestAnimationFrame(doRender);
  }
}

function doRender() {
  renderScheduled = false;
  const token = ++renderToken;
  renderFractal(token);
}

function renderFractal(token) {
  progressBar.style.width = '0%';
  const imageData = ctx.createImageData(W, H);
  const data = imageData.data;
  const pal = palettes[palette];

  // Adaptive maxIter based on zoom
  const zoomLevel = 1 / (zoom * 2.5);
  maxIter = Math.min(500, Math.max(100, Math.floor(80 + 30 * Math.log2(Math.max(1, zoomLevel)))));

  let row = 0;
  function renderChunk() {
    if (token !== renderToken) return; // cancelled
    const chunkSize = 40;
    for (let yi = 0; yi < chunkSize && row < H; yi++, row++) {
      const cy = centerY + (row - H/2) * zoom;
      for (let x = 0; x < W; x++) {
        const cx = centerX + (x - W/2) * zoom;
        let iter;
        switch (fractalType) {
          case 'mandelbrot': iter = mandelbrot(cx, cy); break;
          case 'julia':      iter = julia(cx, cy);      break;
          case 'burning':    iter = burningShip(cx, cy);break;
          default:           iter = mandelbrot(cx, cy);
        }
        const [r,g,b] = pal(iter / maxIter);
        const i = (row * W + x) * 4;
        data[i]   = r;
        data[i+1] = g;
        data[i+2] = b;
        data[i+3] = 255;
      }
    }
    progressBar.style.width = Math.floor(row / H * 100) + '%';
    if (row < H) {
      requestAnimationFrame(renderChunk);
    } else {
      ctx.putImageData(imageData, 0, 0);
      progressBar.style.width = '0%';
      updateZoomDisplay();
    }
  }
  renderChunk();
}

// ─── FRACTAL MATH ─────────────────────────────────────────────
function mandelbrot(cr, ci) {
  let zr = 0, zi = 0, zr2 = 0, zi2 = 0;
  for (let i = 0; i < maxIter; i++) {
    zi = 2 * zr * zi + ci;
    zr = zr2 - zi2 + cr;
    zr2 = zr * zr;
    zi2 = zi * zi;
    if (zr2 + zi2 > 4) {
      // Smooth iteration count
      return i + 1 - Math.log2(Math.log2(Math.sqrt(zr2 + zi2)));
    }
  }
  return maxIter;
}

function julia(zr, zi) {
  const cr = juliaC.r, ci = juliaC.i;
  for (let i = 0; i < maxIter; i++) {
    const nzr = zr*zr - zi*zi + cr;
    zi = 2 * zr * zi + ci;
    zr = nzr;
    const m = zr*zr + zi*zi;
    if (m > 4) {
      return i + 1 - Math.log2(Math.log2(Math.sqrt(m)));
    }
  }
  return maxIter;
}

function burningShip(cr, ci) {
  let zr = 0, zi = 0;
  for (let i = 0; i < maxIter; i++) {
    const nzr = zr*zr - zi*zi + cr;
    zi = Math.abs(2 * zr * zi) + ci;
    zr = nzr;
    const m = zr*zr + zi*zi;
    if (m > 4) return i + 1 - Math.log2(Math.log2(Math.sqrt(m)));
  }
  return maxIter;
}

// ─── INTERACTION ──────────────────────────────────────────────
function resetView() {
  if (fractalType === 'mandelbrot') { centerX = -0.5; centerY = 0; }
  else if (fractalType === 'julia') { centerX = 0; centerY = 0; }
  else if (fractalType === 'burning') { centerX = -0.4; centerY = -0.5; }
  zoom = 1 / 2.5;
  scheduleRender();
}

function updateZoomDisplay() {
  const z = Math.round(1 / (zoom * 2.5));
  if (z < 1000) zoomEl.textContent = z + '×';
  else if (z < 1e6) zoomEl.textContent = (z/1000).toFixed(1) + 'k×';
  else zoomEl.textContent = (z/1e6).toFixed(2) + 'M×';
}

// Scroll to zoom
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 1.25 : 0.8;
  // Zoom toward mouse position
  const mx = e.clientX, my = e.clientY;
  const wx = centerX + (mx - W/2) * zoom;
  const wy = centerY + (my - H/2) * zoom;
  zoom *= factor;
  centerX = wx - (mx - W/2) * zoom;
  centerY = wy - (my - H/2) * zoom;
  scheduleRender();
}, { passive: false });

// Click to center
canvas.addEventListener('click', (e) => {
  centerX = centerX + (e.clientX - W/2) * zoom;
  centerY = centerY + (e.clientY - H/2) * zoom;
  scheduleRender();
});

// Double-click deep zoom
canvas.addEventListener('dblclick', (e) => {
  e.preventDefault();
  centerX = centerX + (e.clientX - W/2) * zoom;
  centerY = centerY + (e.clientY - H/2) * zoom;
  zoom *= 0.3;
  scheduleRender();
});

// Touch — pinch zoom + pan
let lastTouches = null;
canvas.addEventListener('touchstart', (e) => {
  lastTouches = Array.from(e.touches).map(t => ({x: t.clientX, y: t.clientY}));
}, { passive: true });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const touches = Array.from(e.touches).map(t => ({x: t.clientX, y: t.clientY}));
  if (!lastTouches) { lastTouches = touches; return; }

  if (touches.length === 1 && lastTouches.length === 1) {
    // Pan
    const dx = touches[0].x - lastTouches[0].x;
    const dy = touches[0].y - lastTouches[0].y;
    centerX -= dx * zoom;
    centerY -= dy * zoom;
    scheduleRender();
  } else if (touches.length === 2 && lastTouches.length === 2) {
    // Pinch
    const d0 = Math.hypot(lastTouches[0].x - lastTouches[1].x, lastTouches[0].y - lastTouches[1].y);
    const d1 = Math.hypot(touches[0].x - touches[1].x, touches[0].y - touches[1].y);
    if (d0 > 0 && d1 > 0) {
      const midX = (touches[0].x + touches[1].x) / 2;
      const midY = (touches[0].y + touches[1].y) / 2;
      const wx = centerX + (midX - W/2) * zoom;
      const wy = centerY + (midY - H/2) * zoom;
      zoom *= d0 / d1;
      centerX = wx - (midX - W/2) * zoom;
      centerY = wy - (midY - H/2) * zoom;
      scheduleRender();
    }
  }
  lastTouches = touches;
}, { passive: false });

canvas.addEventListener('touchend', () => { lastTouches = null; });

// For Julia: shift+click in Mandelbrot to set c
canvas.addEventListener('click', (e) => {
  if (fractalType === 'mandelbrot' && e.shiftKey) {
    juliaC.r = centerX + (e.clientX - W/2) * zoom;
    juliaC.i = centerY + (e.clientY - H/2) * zoom;
    setFractal('julia', document.getElementById('btn-julia'));
  }
});

// ─── CONTROLS ─────────────────────────────────────────────────
function setFractal(type, btn) {
  fractalType = type;
  document.querySelectorAll('#controls .btn[id^="btn-"]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (type === 'mandelbrot') { centerX = -0.5; centerY = 0; zoom = 1/2.5; }
  else if (type === 'julia')  { centerX = 0; centerY = 0; zoom = 1/2.5; }
  else if (type === 'burning'){ centerX = -0.4; centerY = -0.5; zoom = 1/2.5; }
  scheduleRender();
}

function setPalette(idx, btn) {
  palette = idx;
  document.querySelectorAll('#controls .btn[id^="pal-"]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  scheduleRender();
}

function saveImg() {
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = `fractal-${fractalType}-${Date.now()}.png`;
  a.click();
}

// ─── START ────────────────────────────────────────────────────
scheduleRender();
</script>
</body>
</html>
