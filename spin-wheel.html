<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎡 Spin the Wheel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0015;
    color: #e0d0ff;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  #stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 32px;
    padding: 20px;
    width: 100%;
    max-width: 900px;
  }
  /* LEFT: Wheel */
  .wheel-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .wheel-wrapper {
    position: relative;
    width: 340px;
    height: 340px;
  }
  #wheel-canvas {
    border-radius: 50%;
    box-shadow: 0 0 40px rgba(160, 100, 255, 0.5), 0 0 80px rgba(160, 100, 255, 0.2);
    cursor: pointer;
    transition: box-shadow 0.3s;
  }
  #wheel-canvas:hover {
    box-shadow: 0 0 50px rgba(160, 100, 255, 0.7), 0 0 100px rgba(160, 100, 255, 0.3);
  }
  .pointer {
    position: absolute;
    top: 50%;
    right: -18px;
    transform: translateY(-50%);
    width: 0;
    height: 0;
    border-top: 16px solid transparent;
    border-bottom: 16px solid transparent;
    border-right: 28px solid #fff;
    filter: drop-shadow(0 0 6px rgba(255,255,255,0.8));
    z-index: 10;
  }
  .spin-btn {
    padding: 14px 48px;
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    border: none;
    border-radius: 50px;
    color: white;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    box-shadow: 0 4px 20px rgba(168, 85, 247, 0.5);
    transition: all 0.2s;
  }
  .spin-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 28px rgba(168, 85, 247, 0.7);
  }
  .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* RIGHT: Panel */
  .panel {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 20px;
    width: 280px;
    backdrop-filter: blur(10px);
  }
  .panel h2 {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #a78bfa;
    margin-bottom: 12px;
  }
  .presets {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
  }
  .preset-btn {
    padding: 4px 10px;
    font-size: 0.75rem;
    background: rgba(124, 58, 237, 0.3);
    border: 1px solid rgba(168, 85, 247, 0.4);
    border-radius: 20px;
    color: #c4b5fd;
    cursor: pointer;
    transition: all 0.2s;
  }
  .preset-btn:hover, .preset-btn.active {
    background: rgba(124, 58, 237, 0.7);
    border-color: #a855f7;
    color: white;
  }
  #items-list {
    list-style: none;
    margin-bottom: 12px;
    max-height: 200px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: #7c3aed transparent;
  }
  #items-list li {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 6px;
    border-radius: 6px;
    font-size: 0.85rem;
    transition: background 0.2s;
  }
  #items-list li:hover { background: rgba(255,255,255,0.07); }
  #items-list li .item-color {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  #items-list li .item-text { flex: 1; }
  #items-list li .del-btn {
    background: none; border: none; color: #666; cursor: pointer;
    font-size: 0.9rem; padding: 0 2px; line-height: 1;
    transition: color 0.2s;
  }
  #items-list li .del-btn:hover { color: #f87171; }
  .add-row {
    display: flex;
    gap: 6px;
  }
  #new-item {
    flex: 1;
    padding: 8px 10px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    color: white;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }
  #new-item:focus { border-color: #7c3aed; }
  #new-item::placeholder { color: #666; }
  .add-btn {
    padding: 8px 14px;
    background: #7c3aed;
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .add-btn:hover { background: #6d28d9; }

  /* Winner overlay */
  #winner-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
  }
  #winner-overlay.show { display: flex; }
  .winner-card {
    background: linear-gradient(135deg, #1a0040, #2d0060);
    border: 2px solid #a855f7;
    border-radius: 24px;
    padding: 40px 60px;
    text-align: center;
    box-shadow: 0 0 60px rgba(168, 85, 247, 0.5);
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .winner-label {
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: #a78bfa;
    margin-bottom: 8px;
  }
  .winner-text {
    font-size: 2.2rem;
    font-weight: 900;
    color: white;
    text-shadow: 0 0 20px rgba(168, 85, 247, 0.8);
    margin-bottom: 6px;
  }
  .winner-emoji { font-size: 3rem; margin-bottom: 10px; }
  .close-btn {
    padding: 10px 32px;
    background: rgba(168, 85, 247, 0.3);
    border: 1px solid #a855f7;
    border-radius: 50px;
    color: white;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 4px;
  }
  .close-btn:hover { background: rgba(168, 85, 247, 0.6); }
  #confetti-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 99;
  }
  @media (max-width: 700px) {
    .container { flex-direction: column; gap: 20px; }
    .wheel-wrapper { width: 280px; height: 280px; }
    #wheel-canvas { width: 280px !important; height: 280px !important; }
    .panel { width: 100%; max-width: 340px; }
    .pointer { right: -14px; border-top: 12px solid transparent; border-bottom: 12px solid transparent; border-right: 20px solid #fff; }
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>
<canvas id="confetti-canvas"></canvas>

<div class="container">
  <div class="wheel-area">
    <div class="wheel-wrapper">
      <canvas id="wheel-canvas" width="340" height="340"></canvas>
      <div class="pointer"></div>
    </div>
    <button class="spin-btn" id="spin-btn" onclick="spin()">🎡 SPIN</button>
  </div>

  <div class="panel">
    <h2>🎯 Items</h2>
    <div class="presets">
      <button class="preset-btn" onclick="loadPreset('treatments')">💆 Treatments</button>
      <button class="preset-btn" onclick="loadPreset('lunch')">🍕 Lunch</button>
      <button class="preset-btn" onclick="loadPreset('activities')">🎉 Activities</button>
      <button class="preset-btn" onclick="loadPreset('decisions')">🤔 Decisions</button>
    </div>
    <ul id="items-list"></ul>
    <div class="add-row">
      <input id="new-item" type="text" placeholder="Add something..." maxlength="40" />
      <button class="add-btn" onclick="addItem()">+</button>
    </div>
  </div>
</div>

<div id="winner-overlay" onclick="closeWinner()">
  <div class="winner-card" onclick="e=>e.stopPropagation()">
    <div class="winner-emoji" id="winner-emoji">🎉</div>
    <div class="winner-label">The wheel has spoken!</div>
    <div class="winner-text" id="winner-text">???</div>
    <button class="close-btn" onclick="closeWinner()">Spin Again →</button>
  </div>
</div>

<script>
// ── Stars ────────────────────────────────────────────
const sc = document.getElementById('stars');
const sx = sc.getContext('2d');
sc.width = window.innerWidth; sc.height = window.innerHeight;
const stars = Array.from({length:180},()=>({
  x: Math.random()*sc.width, y: Math.random()*sc.height,
  r: Math.random()*1.5+0.3, a: Math.random(), da: (Math.random()-.5)*.02
}));
function drawStars(){
  sx.clearRect(0,0,sc.width,sc.height);
  stars.forEach(s=>{
    s.a = Math.max(.1,Math.min(1,s.a+s.da));
    if(s.a<=.1||s.a>=1) s.da=-s.da;
    sx.beginPath(); sx.arc(s.x,s.y,s.r,0,Math.PI*2);
    sx.fillStyle=`rgba(255,255,255,${s.a})`; sx.fill();
  });
  requestAnimationFrame(drawStars);
}
drawStars();

// ── Presets ──────────────────────────────────────────
const PRESETS = {
  treatments: ['LHR Full Body','Botox','Filler','CoolSculpting','Clear+Brilliant','IPL','Microneedling','Tattoo Removal'],
  lunch: ['Tacos','Pizza','Sushi','Chipotle','Thai food','Salad (no)','Ramen','Burritos','Chick-fil-A'],
  activities: ['Walk outside','Watch something','Take a nap','Call a friend','Read','Sketch something','Stretch','Do literally nothing'],
  decisions: ['Yes 👍','No 👎','Definitely yes 🔥','Hard pass ❌','Ask Cheese 🧀','Sleep on it 🌙','Do it now 🚀','Flip a coin 🪙'],
};

// ── Colors ───────────────────────────────────────────
const PALETTE = [
  '#7c3aed','#a855f7','#ec4899','#f43f5e','#f59e0b',
  '#10b981','#06b6d4','#3b82f6','#8b5cf6','#d946ef',
  '#fb923c','#4ade80','#38bdf8','#facc15','#f472b6',
  '#6366f1',
];
function getColor(i){ return PALETTE[i % PALETTE.length]; }

// ── Items ─────────────────────────────────────────────
let items = JSON.parse(localStorage.getItem('spinwheel-items')||'null') ||
  ['LHR Full Body','Botox','Filler','CoolSculpting','Clear+Brilliant','IPL','Microneedling','Tattoo Removal'];

function saveItems(){ localStorage.setItem('spinwheel-items', JSON.stringify(items)); }

function renderList(){
  const ul = document.getElementById('items-list');
  ul.innerHTML = '';
  items.forEach((item,i)=>{
    const li = document.createElement('li');
    li.innerHTML = `<span class="item-color" style="background:${getColor(i)}"></span>
      <span class="item-text">${item}</span>
      <button class="del-btn" onclick="removeItem(${i})">✕</button>`;
    ul.appendChild(li);
  });
  drawWheel();
}

function addItem(){
  const inp = document.getElementById('new-item');
  const v = inp.value.trim();
  if(!v || items.length >= 20) return;
  items.push(v);
  inp.value = '';
  saveItems(); renderList();
}

function removeItem(i){
  if(items.length <= 2) return;
  items.splice(i,1);
  saveItems(); renderList();
}

function loadPreset(name){
  items = [...PRESETS[name]];
  saveItems(); renderList();
}

document.getElementById('new-item').addEventListener('keydown', e=>{ if(e.key==='Enter') addItem(); });

// ── Wheel drawing ─────────────────────────────────────
const wc = document.getElementById('wheel-canvas');
const ctx = wc.getContext('2d');
let rotation = 0;

function drawWheel(rot){
  if(rot===undefined) rot = rotation;
  const cx = wc.width/2, cy = wc.height/2, r = Math.min(cx,cy)-8;
  ctx.clearRect(0,0,wc.width,wc.height);

  if(items.length === 0) return;
  const arc = (Math.PI*2) / items.length;

  items.forEach((item,i)=>{
    const start = rot + i*arc - Math.PI/2;
    const end = start + arc;
    // Slice
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,start,end);
    ctx.closePath();
    ctx.fillStyle = getColor(i);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Text
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(start + arc/2);
    ctx.textAlign = 'right';
    ctx.fillStyle = 'white';
    const maxLen = item.length > 14 ? 14 : item.length;
    const fs = items.length > 10 ? 10 : items.length > 6 ? 12 : 14;
    ctx.font = `bold ${fs}px Segoe UI`;
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 4;
    const text = item.length > 16 ? item.slice(0,14)+'…' : item;
    ctx.fillText(text, r-12, 5);
    ctx.restore();
  });

  // Center hub
  ctx.beginPath();
  ctx.arc(cx,cy,22,0,Math.PI*2);
  ctx.fillStyle = '#0a0015';
  ctx.fill();
  ctx.strokeStyle = '#a855f7';
  ctx.lineWidth = 3;
  ctx.stroke();
  // Mouse emoji in center
  ctx.font = '18px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🐭', cx, cy+1);
}

// ── Spin logic ────────────────────────────────────────
let spinning = false;
let currentVelocity = 0;
let angVel = 0;
let animId = null;
let tickTimeout = null;
let lastTickSegment = -1;

// Web Audio for ticks
const AC = new (window.AudioContext||window.webkitAudioContext)();
function playTick(intensity){
  const o = AC.createOscillator();
  const g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type = 'triangle';
  o.frequency.value = 700 + Math.random()*200;
  g.gain.setValueAtTime(0.15 * intensity, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+0.04);
  o.start(); o.stop(AC.currentTime+0.05);
}

function playWin(){
  const notes = [523,659,784,1047];
  notes.forEach((f,i)=>{
    setTimeout(()=>{
      const o = AC.createOscillator();
      const g = AC.createGain();
      o.connect(g); g.connect(AC.destination);
      o.type = 'sine';
      o.frequency.value = f;
      g.gain.setValueAtTime(0.2,AC.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.4);
      o.start(); o.stop(AC.currentTime+0.4);
    }, i*120);
  });
}

function getWinner(){
  if(items.length===0) return null;
  const arc = (Math.PI*2)/items.length;
  // Pointer is at angle 0 (right of center, but we offset by -PI/2)
  // Effective angle relative to first item start
  const norm = ((rotation % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
  // pointer at angle PI (right side after -PI/2 offset means pointer is at PI/2 in raw coords)
  // Actually: pointer is at the 3-o'clock position (rightmost point)
  // Items start at rotation - PI/2, so the item at the pointer (PI) is:
  const pointerAngle = Math.PI/2; // pointer is at 90° from top = 3 o'clock
  const normalizedRot = ((rotation % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
  // The angle of the pointer relative to the wheel
  const relAngle = ((pointerAngle - normalizedRot) % (Math.PI*2) + Math.PI*2) % (Math.PI*2);
  const idx = Math.floor(relAngle / arc) % items.length;
  return items[idx];
}

function spin(){
  if(spinning || items.length < 2) return;
  if(AC.state === 'suspended') AC.resume();
  spinning = true;
  document.getElementById('spin-btn').disabled = true;
  lastTickSegment = -1;

  // Random total rotation: 5-12 full spins + random
  const totalRot = (Math.PI*2) * (5 + Math.random()*7) + Math.random()*(Math.PI*2);
  const startRot = rotation;
  const endRot = startRot + totalRot;
  const duration = 4000 + Math.random()*2000; // 4-6s
  const startTime = performance.now();

  function ease(t){ return 1 - Math.pow(1-t, 4); } // easeOutQuart

  function frame(now){
    const elapsed = now - startTime;
    const t = Math.min(elapsed/duration, 1);
    rotation = startRot + totalRot * ease(t);

    // Tick sound
    const arc = (Math.PI*2)/items.length;
    const seg = Math.floor(((rotation % (Math.PI*2))+(Math.PI*2))%(Math.PI*2)/arc);
    if(seg !== lastTickSegment){
      const intensity = 1 - ease(t) * 0.7; // louder at start
      playTick(Math.max(0.2, intensity));
      lastTickSegment = seg;
    }

    drawWheel(rotation);

    if(t < 1){
      animId = requestAnimationFrame(frame);
    } else {
      rotation = endRot;
      drawWheel(rotation);
      spinning = false;
      document.getElementById('spin-btn').disabled = false;
      const winner = getWinner();
      if(winner) showWinner(winner);
    }
  }

  animId = requestAnimationFrame(frame);
}

// ── Winner ────────────────────────────────────────────
const EMOJIS = ['🎉','🏆','🥳','✨','🎊','🔥','⭐','💫','🎯','🧀'];
function showWinner(text){
  playWin();
  document.getElementById('winner-text').textContent = text;
  document.getElementById('winner-emoji').textContent = EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
  document.getElementById('winner-overlay').classList.add('show');
  launchConfetti();
}

function closeWinner(){
  document.getElementById('winner-overlay').classList.remove('show');
  stopConfetti();
}

// ── Confetti ───────────────────────────────────────────
const cc = document.getElementById('confetti-canvas');
const ccx = cc.getContext('2d');
cc.width = window.innerWidth; cc.height = window.innerHeight;
let confettiPieces = [];
let confettiAnimId = null;

function launchConfetti(){
  confettiPieces = Array.from({length:120},()=>({
    x: Math.random()*cc.width, y: -10,
    vx: (Math.random()-.5)*8, vy: Math.random()*4+2,
    color: PALETTE[Math.floor(Math.random()*PALETTE.length)],
    w: Math.random()*10+5, h: Math.random()*6+3,
    rot: Math.random()*Math.PI*2, drot: (Math.random()-.5)*.2,
    alpha: 1
  }));
  function frame(){
    ccx.clearRect(0,0,cc.width,cc.height);
    confettiPieces.forEach(p=>{
      p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.rot += p.drot;
      if(p.y > cc.height) p.alpha -= 0.05;
      if(p.alpha <= 0) return;
      ccx.save();
      ccx.globalAlpha = p.alpha;
      ccx.translate(p.x,p.y);
      ccx.rotate(p.rot);
      ccx.fillStyle = p.color;
      ccx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ccx.restore();
    });
    confettiPieces = confettiPieces.filter(p=>p.alpha>0);
    if(confettiPieces.length > 0) confettiAnimId = requestAnimationFrame(frame);
    else ccx.clearRect(0,0,cc.width,cc.height);
  }
  if(confettiAnimId) cancelAnimationFrame(confettiAnimId);
  confettiAnimId = requestAnimationFrame(frame);
}

function stopConfetti(){
  if(confettiAnimId) cancelAnimationFrame(confettiAnimId);
  ccx.clearRect(0,0,cc.width,cc.height);
}

// ── Wheel click to spin ───────────────────────────────
wc.addEventListener('click', ()=>{ if(!spinning) spin(); });

// ── Resize ────────────────────────────────────────────
window.addEventListener('resize',()=>{
  sc.width=window.innerWidth; sc.height=window.innerHeight;
  cc.width=window.innerWidth; cc.height=window.innerHeight;
});

// ── Init ──────────────────────────────────────────────
renderList();
</script>
</body>
</html>
