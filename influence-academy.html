<p>In aikido, you <strong>redirect your opponent's energy</strong> rather than meeting it head-on. Objection handling works the same way. Don't fight the objection — absorb it, redirect it, and use its momentum to close.</p>

<h3>The LAER Framework</h3>
<ul>
<li><strong>L — Listen</strong> fully. Don't interrupt. Let them finish. The objection often softens just by being heard.</li>
<li><strong>A — Acknowledge</strong> "That makes total sense" / "I appreciate you being honest about that"</li>
<li><strong>E — Explore</strong> "Help me understand — is it more about X or Y?" Get to the real issue.</li>
<li><strong>R — Respond</strong> Only now, with the real objection identified, give your targeted response.</li>
</ul>

<div class="example"><div class="label">LaserAway Application</div>
<p>"I need to talk to my husband."<br><br>
<strong>L:</strong> *Listen, nod, wait for them to finish*<br>
<strong>A:</strong> "That makes a lot of sense — it's a decision that affects both of you."<br>
<strong>E:</strong> "When you talk to him, what do you think his main concern will be — the investment, or something else?"<br>
<strong>R:</strong> (If cost) "Would it help if I put together a comparison showing the long-term savings? That way you have something concrete to discuss."<br><br>
You've turned a walkaway into a partnership — you're now on their team, helping them close the deal at home.</p></div>

<h3>The "Feel, Felt, Found" Classic</h3>
<p>"I understand how you feel. Other clients have felt the same way. What they found was..." It's old-school but it works because it validates (feel), normalizes (felt), and resolves (found) in one smooth motion.</p>

<div class="tip"><div class="label">Pro Tip</div>
<p>The most powerful response to any objection is a question, not an answer. Questions keep the conversation going and give you more information. Answers can feel like arguments.</p></div>
`,
quiz:[
{q:'What does the "L" in LAER stand for and why is it first?',opts:['Lead — take control immediately','Listen — fully hear the objection before responding, which often softens it','Look — observe their body language','Leverage — find their weakness'],correct:1,explain:'Listening is first because people need to feel heard before they\'ll hear you. Plus, the act of fully expressing an objection often reduces its emotional intensity.'},
{q:'Why is a question often better than an answer when handling objections?',opts:['Questions buy time','Questions keep the conversation going and reveal the real issue; answers can feel like arguments','It\'s more polite','Questions are easier'],correct:1,explain:'An answer to a surface objection might miss the real issue entirely. A question explores deeper, gets more data, and keeps them engaged rather than defensive.'},
{q:'In "Feel, Felt, Found" — what does the "Felt" component do?',opts:['Validates their emotion','Normalizes their concern by showing others had the same reaction','Presents the solution','Builds urgency'],correct:1,explain:'"Others felt the same way" normalizes their concern. They\'re not weird, wrong, or alone — which removes defensiveness and opens them to the "found" (resolution).'}
]},
];

{

// ==================== APP STATE ====================
const LS_KEY = 'influence_academy_v2';
let state = loadState();

function defaultState(){
return {
completed:{},quizScores:{},streak:0,lastVisit:null,
scenariosCompleted:{},dailyLessonIndex:0,lastDailyDate:null,
reviewQueue:[],quizHistory:[]
};
}

function loadState(){
try{const s=localStorage.getItem(LS_KEY);return s?{...defaultState(),...JSON.parse(s)}:defaultState();}
catch(e){return defaultState();}
}

function saveState(){localStorage.setItem(LS_KEY,JSON.stringify(state));}

function getToday(){return new Date().toISOString().split('T')[0];}

function updateStreak(){
const today=getToday();
if(state.lastVisit===today)return;
const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
const yd=yesterday.toISOString().split('T')[0];
if(state.lastVisit===yd){state.streak++;}
else if(state.lastVisit!==today){state.streak=1;}
state.lastVisit=today;
saveState();
}

function getDailyLesson(){
const today=getToday();
if(state.lastDailyDate!==today){
const incomplete=LESSONS.filter(l=>!state.completed[l.id]);
if(incomplete.length>0){
const dayNum=Math.floor(Date.now()/86400000);
state.dailyLessonIndex=dayNum%LESSONS.length;
let attempts=0;
while(state.completed[LESSONS[state.dailyLessonIndex].id]&&attempts<LESSONS.length){
state.dailyLessonIndex=(state.dailyLessonIndex+1)%LESSONS.length;
attempts++;
}
}
state.lastDailyDate=today;
saveState();
}
return LESSONS[state.dailyLessonIndex];
}

function getReviewLessons(){
const reviews=[];const now=Date.now();
for(const id in state.quizScores){
const s=state.quizScores[id];
if(!s||!s.lastTaken)continue;
const score=s.correct/s.total;
let interval;
if(score>=0.8)interval=7*86400000;
else if(score>=0.6)interval=3*86400000;
else interval=1*86400000;
if(now-s.lastTaken>interval){
const lesson=LESSONS.find(l=>l.id===id);
if(lesson)reviews.push(lesson);
}
}
return reviews;
}

// ==================== VIEWS ====================
function showView(name){
document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
const btn=document.querySelector(`[data-view="${name}"]`);
if(btn)btn.classList.add('active');

if(name==='today')renderToday();
else if(name==='library')renderLibrary();
else if(name==='scenarios')renderScenarios();
else if(name==='dashboard')renderDashboard();

document.getElementById(name+'View').classList.add('active');
window.scrollTo({top:0,behavior:'smooth'});
}

function renderToday(){
const daily=getDailyLesson();
const reviews=getReviewLessons();
const completedCount=Object.keys(state.completed).length;
const totalLessons=LESSONS.length;

let html=`<div class="daily-hero" onclick="openLesson('${daily.id}')">
<div class="label">📅 Today's Lesson</div>
<h2>${daily.icon} ${daily.title}</h2>
<p>${daily.cat} · ${daily.time} min read</p>
</div>`;

if(reviews.length>0){
html+=`<div class="review-banner" onclick="openLesson('${reviews[0].id}')">
<div class="icon">🔄</div>
<div class="info">
<h3>${reviews.length} lesson${reviews.length>1?'s':''} due for review</h3>
<p>Spaced repetition keeps knowledge fresh — tap to review</p>
</div>
</div>`;
}

html+=`<div class="section-title">📈 Your Progress</div>
<div class="stats-grid">
<div class="stat-card"><div class="num">${completedCount}/${totalLessons}</div><div class="label">Lessons Done</div></div>
<div class="stat-card"><div class="num">${getAvgScore()}%</div><div class="label">Avg Quiz Score</div></div>
<div class="stat-card"><div class="num">${state.streak}</div><div class="label">Day Streak</div></div>
<div class="stat-card"><div class="num">${Object.keys(state.scenariosCompleted).length}/${SCENARIOS.length}</div><div class="label">Scenarios</div></div>
</div>
<div class="progress-bar"><div class="progress-fill" style="width:${(completedCount/totalLessons*100)}%"></div></div>
<p style="text-align:center;color:var(--text-dim);font-size:0.85em;margin-top:8px">${Math.round(completedCount/totalLessons*100)}% complete</p>`;

// Recent incomplete
const incomplete=LESSONS.filter(l=>!state.completed[l.id]).slice(0,3);
if(incomplete.length>0){
html+=`<div class="section-title" style="margin-top:30px">🎯 Up Next</div>`;
incomplete.forEach(l=>{
html+=lessonCard(l);
});
}

document.getElementById('todayView').innerHTML=html;
}

function renderLibrary(filterCat=null){
const cats=[...new Set(LESSONS.map(l=>l.cat))];
let html=`<div class="cat-filters">
<div class="cat-pill ${!filterCat?'active':''}" onclick="renderLibrary();document.getElementById('libraryView').classList.add('active')">All</div>`;
cats.forEach(c=>{
html+=`<div class="cat-pill ${filterCat===c?'active':''}" onclick="renderLibrary('${c}');document.getElementById('libraryView').classList.add('active')">${c}</div>`;
});
html+=`</div>`;

const filtered=filterCat?LESSONS.filter(l=>l.cat===filterCat):LESSONS;
filtered.forEach(l=>{html+=lessonCard(l);});

document.getElementById('libraryView').innerHTML=html;
}

function lessonCard(l){
const done=state.completed[l.id];
const review=getReviewLessons().find(r=>r.id===l.id);
const score=state.quizScores[l.id];
let badge='';
if(review)badge=`<div class="card-badge badge-review">Review Due</div>`;
else if(done)badge=`<div class="card-badge badge-complete">✓ Complete</div>`;
else badge=`<div class="card-badge badge-new">New</div>`;

let meta=`<span>📖 ${l.time} min</span><span>📁 ${l.cat}</span>`;
if(score)meta+=`<span>📝 ${Math.round(score.correct/score.total*100)}%</span>`;

return `<div class="card" onclick="openLesson('${l.id}')">
${badge}
<div class="card-cat">${l.cat}</div>
<div class="card-title">${l.icon} ${l.title}</div>
<div class="card-meta">${meta}</div>
</div>`;
}

function openLesson(id){
const lesson=LESSONS.find(l=>l.id===id);
if(!lesson)return;

document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
const lv=document.getElementById('lessonView');
lv.classList.add('active');

let html=`<div class="lesson-view">
<div class="lesson-back" onclick="showView('${document.querySelector('.nav-btn.active')?.dataset.view||'today'}')">← Back</div>
<div class="lesson-header">
<div class="cat">${lesson.cat}</div>
<h2>${lesson.icon} ${lesson.title}</h2>
<div style="color:var(--text-dim);font-size:0.85em;margin-top:4px">📖 ${lesson.time} min read · ${lesson.quiz.length} quiz questions</div>
</div>
<div class="lesson-content">${lesson.content}</div>
<div class="lesson-actions">
<button class="btn btn-primary" onclick="startQuiz('${lesson.id}')">📝 Take Quiz</button>
${!state.completed[lesson.id]?`<button class="btn btn-success" onclick="markComplete('${lesson.id}')">✓ Mark as Read</button>`:''}
</div>
<div id="quizContainer"></div>
</div>`;

lv.innerHTML=html;
window.scrollTo({top:0,behavior:'smooth'});
}

function markComplete(id){
state.completed[id]=Date.now();
saveState();
openLesson(id);
}

// ==================== QUIZ ====================
let currentQuiz=null;

function startQuiz(lessonId){
const lesson=LESSONS.find(l=>l.id===lessonId);
if(!lesson)return;
currentQuiz={lessonId,questions:lesson.quiz,current:0,correct:0,answers:[]};
renderQuiz();
document.getElementById('quizContainer').scrollIntoView({behavior:'smooth'});
}

function renderQuiz(){
const q=currentQuiz;
if(!q)return;
const container=document.getElementById('quizContainer');

if(q.current>=q.questions.length){
const pct=Math.round(q.correct/q.questions.length*100);
state.quizScores[q.lessonId]={correct:q.correct,total:q.questions.length,lastTaken:Date.now()};
if(!state.completed[q.lessonId])state.completed[q.lessonId]=Date.now();
state.quizHistory.push({lessonId:q.lessonId,score:pct,date:getToday()});
saveState();

let msg,emoji;
if(pct>=80){msg='Excellent! You\'ve mastered this material.';emoji='🏆';}
else if(pct>=60){msg='Good work! Review the lesson to strengthen weak areas.';emoji='👍';}
else{msg='Keep studying — this material will click with practice.';emoji='📚';}

container.innerHTML=`<div class="quiz-container"><div class="quiz-result">
<div style="font-size:3em;margin-bottom:10px">${emoji}</div>
<div class="score">${pct}%</div>
<div class="label">${q.correct}/${q.questions.length} correct</div>
<p style="color:var(--text-dim);margin-top:16px;font-size:0.95em">${msg}</p>
<div style="margin-top:20px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
<button class="btn btn-primary" onclick="startQuiz('${q.lessonId}')">🔄 Retake Quiz</button>
<button class="btn btn-secondary" onclick="showView('library')">📚 More Lessons</button>
</div>
</div></div>`;
updateStreak();
return;
}

const question=q.questions[q.current];
let dots='<div class="quiz-progress">';
for(let i=0;i<q.questions.length;i++){
let cls='quiz-dot';
if(i===q.current)cls+=' current';
else if(i<q.current)cls+=q.answers[i]?' correct':' wrong';
dots+=`<div class="${cls}"></div>`;
}
dots+='</div>';

let opts='';
question.opts.forEach((o,i)=>{
opts+=`<button class="quiz-option" onclick="answerQuiz(${i})" id="qopt${i}">${o}</button>`;
});

container.innerHTML=`<div class="quiz-container">
${dots}
<div style="color:var(--text-dim);font-size:0.82em;margin-bottom:12px">Question ${q.current+1} of ${q.questions.length}</div>
<div class="quiz-question">${question.q}</div>
${opts}
<div id="quizFeedback"></div>
</div>`;
}

function answerQuiz(idx){
const q=currentQuiz;
const question=q.questions[q.current];
const isCorrect=idx===question.correct;
if(isCorrect)q.correct++;
q.answers.push(isCorrect);

document.querySelectorAll('.quiz-option').forEach((btn,i)=>{
btn.classList.add('disabled');
if(i===question.correct)btn.classList.add('correct');
else if(i===idx&&!isCorrect)btn.classList.add('wrong');
});

document.getElementById('quizFeedback').innerHTML=`
<div class="quiz-explanation">
<strong>${isCorrect?'✅ Correct!':'❌ Not quite.'}</strong><br>${question.explain}
</div>
<button class="btn btn-primary" style="margin-top:16px" onclick="nextQuizQ()">
${q.current+1<q.questions.length?'Next Question →':'See Results'}
</button>`;
}

function nextQuizQ(){
currentQuiz.current++;
renderQuiz();
document.getElementById('quizContainer').scrollIntoView({behavior:'smooth'});
}

function revealScenario(sIdx,chosen){
const s=SCENARIOS[sIdx];
state.scenariosCompleted[sIdx]=true;
saveState();

s.options.forEach((o,i)=>{
const el=document.getElementById('sopt'+i);
el.classList.add('revealed',o.rating);
el.style.cursor='default';
el.onclick=null;
const fb=document.createElement('div');
fb.className='scenario-feedback';
fb.style.color=o.rating==='best'?'var(--success)':o.rating==='ok'?'var(--warning)':'var(--danger)';
fb.style.background=o.rating==='best'?'#10b98111':o.rating==='ok'?'#f59e0b11':'#ef444411';
const label=o.rating==='best'?'✅ Best Response':o.rating==='ok'?'⚠️ Okay, But...':'❌ Avoid This';
fb.innerHTML=`<strong>${label}</strong><br>${o.explain}`;
el.after(fb);
});

const next=sIdx+1<SCENARIOS.length?
`<button class="btn btn-primary" style="margin-top:20px" onclick="openScenario(${sIdx+1})">Next Scenario →</button>`:
`<button class="btn btn-success" style="margin-top:20px" onclick="showView('scenarios')">🏆 All Scenarios Complete!</button>`;
document.getElementById('scenarioFeedback').innerHTML=next;
}

// ==================== DASHBOARD ====================
function getAvgScore(){
const scores=Object.values(state.quizScores);
if(scores.length===0)return 0;
const avg=scores.reduce((a,s)=>a+(s.correct/s.total),0)/scores.length*100;
return Math.round(avg);
}

function renderDashboard(){
const completedCount=Object.keys(state.completed).length;
const totalLessons=LESSONS.length;
const avgScore=getAvgScore();
const totalQuizzes=Object.keys(state.quizScores).length;
const scenariosDone=Object.keys(state.scenariosCompleted).length;

let html=`<div class="section-title">📊 Progress Dashboard</div>
<div class="stats-grid">
<div class="stat-card"><div class="num">${completedCount}</div><div class="label">Lessons Completed</div></div>
<div class="stat-card"><div class="num">${totalQuizzes}</div><div class="label">Quizzes Taken</div></div>
<div class="stat-card"><div class="num">${avgScore}%</div><div class="label">Avg Quiz Score</div></div>
<div class="stat-card"><div class="num">${state.streak}🔥</div><div class="label">Day Streak</div></div>
<div class="stat-card"><div class="num">${scenariosDone}/${SCENARIOS.length}</div><div class="label">Scenarios Done</div></div>
<div class="stat-card"><div class="num">${Math.round(completedCount/totalLessons*100)}%</div><div class="label">Overall Progress</div></div>
</div>`;

// Progress by category
const cats=[...new Set(LESSONS.map(l=>l.cat))];
html+=`<div class="section-title" style="margin-top:30px">📁 Progress by Category</div>`;
cats.forEach(cat=>{
const catLessons=LESSONS.filter(l=>l.cat===cat);
const catDone=catLessons.filter(l=>state.completed[l.id]).length;
const pct=Math.round(catDone/catLessons.length*100);
html+=`<div style="margin-bottom:16px">
<div style="display:flex;justify-content:space-between;font-size:0.9em;margin-bottom:4px">
<span>${cat}</span><span style="color:var(--text-dim)">${catDone}/${catLessons.length}</span>
</div>
<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
</div>`;
});

// Quiz history
if(state.quizHistory.length>0){
html+=`<div class="section-title" style="margin-top:30px">📝 Recent Quiz Scores</div>`;
const recent=state.quizHistory.slice(-10).reverse();
recent.forEach(h=>{
const lesson=LESSONS.find(l=>l.id===h.lessonId);
const cls=h.score>=80?'good':h.score>=60?'ok':'bad';
html+=`<div class="history-item">
<span>${lesson?lesson.icon+' '+lesson.title:'Unknown'}</span>
<span class="history-score ${cls}">${h.score}%</span>
</div>`;
});
}

// Spaced repetition status
const reviews=getReviewLessons();
if(reviews.length>0){
html+=`<div class="section-title" style="margin-top:30px">🔄 Due for Review</div>`;
reviews.forEach(l=>{
const score=state.quizScores[l.id];
const pct=score?Math.round(score.correct/score.total*100):0;
html+=`<div class="card" onclick="openLesson('${l.id}')">
<div class="card-badge badge-review">Review</div>
<div class="card-title">${l.icon} ${l.title}</div>
<div class="card-meta"><span>Last score: ${pct}%</span></div>
</div>`;
});
}

html+=`<div style="margin-top:40px;text-align:center">
<button class="btn btn-secondary btn-sm" onclick="document.getElementById('resetModal').classList.add('active')">🗑️ Reset All Progress</button>
</div>`;

document.getElementById('dashboardView').innerHTML=html;
}

function closeModal(){document.getElementById('resetModal').classList.remove('active');}
function resetProgress(){
localStorage.removeItem(LS_KEY);
state=defaultState();
closeModal();
showView('today');
}

// ==================== INIT ====================
updateStreak();
const sb=document.getElementById('streakBadge');
const sc=document.getElementById('streakCount');
sc.textContent=state.streak;
if(state.streak>=3)sb.classList.add('active');
showView('today');
</script>
</body>
</html>
